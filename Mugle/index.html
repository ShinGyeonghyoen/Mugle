<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mugle</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#c78a4a">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mugle">

<link rel="apple-touch-icon" href="./icons/icon-192.png">
</head>
<body>
  <div class="app">
    <h1>Mugle</h1>
    <p>Lunch Decision App</p>

    <div id="character" class="character mood-happy">
      <div class="tail"></div>

      <div class="ear left"></div>
      <div class="ear right"></div>

      <div class="body">
        <div class="eye-patch left">
          <div class="eye"></div>
          <div class="eyebrow"></div>
        </div>

        <div class="eye-patch right">
          <div class="eye"></div>
          <div class="eyebrow"></div>
        </div>

        <div class="nose"></div>
        <div class="mouth"></div>
        <div class="belly"></div>
      </div>

      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>

    <div id="message" class="message"></div>

    <div id="filterBox" class="filter-box">
      <div class="filter-group">
        <label for="styleSelect">식사 스타일</label>
        <select id="styleSelect">
          <option value="any">상관없음</option>
          <option value="light">가볍게</option>
          <option value="heavy">든든하게</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="soloSelect">식사 형태</label>
        <select id="soloSelect">
          <option value="any">상관없음</option>
          <option value="solo">혼밥 위주</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="quickSelect">속도</label>
        <select id="quickSelect">
          <option value="any">상관없음</option>
          <option value="quick">빨리 먹기</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="budgetSelect">예산</label>
        <select id="budgetSelect">
          <option value="any">상관없음</option>
          <option value="cheap">저렴하게</option>
          <option value="normal">보통까지</option>
        </select>
      </div>
    </div>

    <div id="menu-list" class="menu-list"></div>

    <div id="resultBox" class="result-box hidden">
      <div class="result-label">오늘의 점심 확정</div>
      <div id="resultMenu" class="result-menu"></div>
      <div id="resultJpName" class="result-jp-name"></div>
    </div>

    <div class="action-row">
      <button id="recommendBtn" class="primary">추천 받기</button>
      <button id="again" class="secondary">다시 추천</button>
      <button id="resetBtn" class="tertiary hidden">처음부터 다시</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js")
        .then((registration) => {
          console.log("Service Worker registered:", registration.scope);
        })
        .catch((error) => {
          console.log("Service Worker registration failed:", error);
        });
    });
  }
</script>
</body>
</html>
